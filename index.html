<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sonic Pro — Professional music mix analyzer. EBU R128 LUFS, spectral analysis, Delta engine, AI Mix Coach." />
    <meta name="theme-color" content="#2563eb" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>Sonic Pro — Mix Analyzer</title>
    <!-- Anti-flash: apply saved theme before React hydrates -->
    <script>
      (function() {
        var t = localStorage.getItem('sonic-pro-theme');
        if (t === 'light') {
          document.documentElement.classList.remove('dark');
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
