<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#00d8ff" />
    <meta name="description" content="Production-grade music mix analyzer with Delta reference comparison and DSP spectral analysis." />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="any" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!--
      CSS Custom Properties — Theme System
      ─────────────────────────────────────────────────────────────────────
      :root          → Studio Dark (default)
      [data-theme="light"] → Studio Light

      Set by App.jsx:
        document.documentElement.setAttribute("data-theme", theme)
      Persisted in:
        localStorage.getItem("sonic-pro-theme")

      All component styles reference var(--*) so a single attribute
      flip on <html> changes the entire UI with zero JS re-renders.
    -->
    <style>
      :root {
        /* ── Studio Dark (default) ────────────────── */
        --bg0:          #060611;
        --bg1:          #0d0d1e;
        --bg2:          #14142a;
        --bg3:          #1c1c38;
        --border:       #252545;
        --border-bright:#3a3a60;
        --text-prim:    #c8c8e8;
        --text-muted:   #555575;
        --text-dim:     #35355a;
        --cyan:         #00d8ff;
        --orange:       #ff8c00;
        --green:        #00ff87;
        --yellow:       #ffd000;
        --red:          #ff3060;
        --purple:       #a06dff;
      }

      [data-theme="light"] {
        /* ── Studio Light ─────────────────────────── */
        --bg0:          #f5f5f7;
        --bg1:          #ffffff;
        --bg2:          #f0f0f5;
        --bg3:          #e8e8f0;
        --border:       #d0d0d8;
        --border-bright:#b8b8c0;
        --text-prim:    #1a1a2e;
        --text-muted:   #6b6b7f;
        --text-dim:     #a0a0b0;
        --cyan:         #0066cc;
        --orange:       #cc6600;
        --green:        #007700;
        --yellow:       #996600;
        --red:          #cc0033;
        --purple:       #6633cc;
      }

      /* Prevent flash of wrong theme before React hydrates */
      html, body { background: var(--bg0); margin: 0; padding: 0; }
    </style>

    <!--
      Inline script — reads localStorage before React loads to set the
      theme attribute synchronously. This prevents a "flash" where the
      page briefly shows dark colours before switching to light.
    -->
    <script>
      (function() {
        var t = localStorage.getItem("sonic-pro-theme");
        if (t === "light") document.documentElement.setAttribute("data-theme", "light");
      })();
    </script>

    <title>Sonic Pro — Mix Analyzer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
